<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIGSS+</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f7fafc;
      color: #2d3748;
    }
    .header {
      background-color: #1a365d;
      color: #ffffff;
      padding: 12px 15px;
      text-align: center;
    }
    .title {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
    }
    .subtitle {
      font-size: 10px;
      opacity: 0.8;
      display: block;
      margin-top: 2px;
    }
    .content {
      padding: 15px;
      text-align: center;
    }
    .status-badge {
      display: inline-block;
      background-color: #c6f6d5;
      color: #22543d;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .info-text {
      font-size: 12px;
      line-height: 1.5;
      color: #4a5568;
      margin-bottom: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #1a365d;
      color: #ffffff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      box-sizing: border-box;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #2b6cb0;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">SIGSS+</h1>
    <span class="subtitle">Extensão de Produtividade</span>
  </header>

  <main class="content">
    <span class="status-badge">✓ EXTENSÃO ATIVA</span>
    
    <p class="info-text">
      O painel lateral (Sidebar) foi <strong>incorporado diretamente</strong> à tela do SIGSS. 
      Deslize a aba flutuante no lado direito da página para gerenciar mapeamentos e configurações.
    </p>

    <button id="btn-offline" class="btn">Visualizar Fila Offline</button>
  </main>
</body>
</html>
